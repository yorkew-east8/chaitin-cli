                      description: "Cisco Unified Communications Manager（CUCM，Unified CM，CallManager）是美国思科（Cisco）公司的一款统一通信系统中的呼叫处理组件。该组件提供了一种可扩展、可分布和高可用的企业IP电话呼叫处理解决方案。Cisco Unified Contact Center Express是单节点和双节点呼叫中心服务器。Cisco Unified Interactive Voice Response是提供IP呼叫队列和IP智能音频回复的UCCX产品包。 \n多个思科产品目录在实现上存在目录遍历漏洞，攻击者可利用这些漏洞在应用程序当前目录之外写入任意文件。"
                      disclosure_date: "2011-10-28"
                      id: 000cd788-f1cf-4d50-a3d4-825592b2674d
                      impact: 攻击者通过利用一些特殊字符就可以绕过服务器的安全限制，访问任意的文件（可以使 web 根目录以外的文件），甚至执行系统命令。
                      products:
                        - id: 057b646e-e7a2-40c3-bd70-83637ca03fea
                          name: Cisco Unified Communications Manager
                      reference:
                        - http://tools.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-20111026-cucm
                        - http://tools.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-20111026-uccx
                      severity: 2
                      solution: |-
                        1. 配置文件：在配置文件中限制访问的文件目录，比如 PHP 中 php.ini 配置 open_basedir。
                            2. 特殊字符过滤：检查用户输入，过滤或转义含有“../”、“..\”、“%00”，“..”，“./”，“#”等跳转目录或字符终止符、截断字符的输入。
                            3. 合法性判断：严格过滤用户输入字符的合法性，比如文件类型、文件地址、文件内容等。
                            4. 对传入的文件名参数进行过滤，并且判断是否是允许获取的文件类型，过滤回溯符 ../
                            5. 白名单：白名单限定访问文件的路径、名称及后缀名。
