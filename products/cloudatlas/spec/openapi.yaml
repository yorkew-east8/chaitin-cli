                      description: |-
                        MySQL 弱口令漏洞指的是在 MySQL 数据库系统中对应的账号使用的口令为弱口令的情况，密码仅包含简单数字和字母的口令，例如 “123”、“abc” 等。

                        该种情况下数据库账户的口令很容易被爆破工具暴力破解，一旦被恶意利用来登录系统，会导致数据泄露。如果得到了 root 权限登录 MySQL 服务器，则可以写入恶意文件，危害更大。
                      disclosure_date: "1970-01-01"
                      id: 00000000-5abb-c031-e098-8e2efb5c8a29
                      impact: 攻击者可在没有认证的情况下直接操作对应的 API 接口，可直接被非法增删改查数据。且因为攻击是在未认证下进行的，所以后续无法通过定位用户进行异常排查。
                      products: []
                      reference: []
                      severity: 2
                      solution: |-
                        1. 修改口令，增加口令复杂度，如同时包含大小写字母、数字和特殊字符等。
                        2. 修改完口令后，同时修改应用程序连接数据库的相关账号和密码。
                        2. 应该对 MySQL 账户设置允许访问的 IP 白名单。
                        3. 不要使用默认的操作系统账号连接数据库，可以新建一个单独的数据库账号，并授权其连接数据库。
                        4. 对于支持密码强度验证插件 validate_password 的 MySQL 版本，应正确开启该设置。
                        5. 通过设置防火墙 ip 规则，禁止外部访问 MySQL 服务器端口。
                        6. 不要使用高权限账户启动 MySQL 服务。
