                      description: Redis是一个开源的，存储在内存中的数据结构库。当Redis数据库使用默认配置或者设置了弱口令，攻击者可能就有机会获取到Redis数据库的访问权限，可能会导致未授权的数据访问和潜在的数据泄露。
                      disclosure_date: "1970-01-01"
                      id: 00000000-5a53-53cd-e098-8e2e3c27a927
                      impact: 攻击者利用此漏洞可直接进入应用系统或者管理系统，从而进行系统、网页、数据的篡改与删除，非法获取系统、用户的数据，甚至可能导致服务器沦陷。
                      products: []
                      reference: []
                      severity: 2
                      solution: |-
                        1. 通过修改 redis.conf 文件来禁用远程修改 DB 文件地址，禁止远程使用一些高危命令；
                        2. 低权限运行 Redis 服务，为 Redis 服务创建单独的 user 和 home 目录，并且配置禁止登陆；
                        3. 通过修改 redis.conf文件来为 Redis 添加强密码验证；
                        4. 通过修改 redis.conf 文件来使得 Redis 服务只在当前主机可用，禁止外网访问 Redis；
                        5. 将 authorized_keys 的权限设置为对拥有者只读，其他用户没有任何权限，保证 authorized_keys 文件的安全。
                      subjects:
                        - id: 00000000-0000-0000-0000-000000000001
                          name: 护网实战专题
                        - id: 00000000-0000-0000-0000-000000000002
                          name: 弱口令专题
                      title: Redis 弱口令漏洞
                      updated_at: "2024-04-15 10:22:36"
                      verify_way: 原理检测
                    - category: 弱口令
