                      cve: ""
                      cvss3: "0.0"
                      cwe: ""
                      description: RabbitMQ 弱口令漏洞指用于登录 RabbitMQ 代理服务器的用户口令的长度太短、复杂度不够、仅包含数字、或仅包含字母等，容易被攻击者爆破进行非法访问。攻击者利用 RabbitMQ 弱口令漏洞直接登录 RabbitMQ 服务器，查看服务器上的信息，修改服务器配置，造成敏感数据泄露甚至控制服务器，危害较大。
                      disclosure_date: "1970-01-01"
                      id: 00000000-5ab4-9800-e098-8e497f2a8f46
                      impact: 攻击者利用此漏洞可直接进入应用系统或者管理系统，从而进行系统、网页、数据的篡改与删除，非法获取系统、用户的数据，甚至可能导致服务器沦陷。
                      products:
                        - id: 87b8d058-f130-417b-9b98-c65ff074aa56
                          name: AMQP服务
                      reference: []
                      severity: 2
                      solution: |-
                        1. 设置强安全密码，密码长度和包含的字符类型要满足一定的复杂度；
                        2. 指定访问源 IP ，限制可访问 RabbitMQ 服务器的 IP；
                        3. 通过修改配置，关闭远程登录 RabbitMQ 服务器的功能；
                        4. 启用账户登录失败处理机制，对登录失败的账户实施强处理，可有效防止暴力破解攻击事件；
                        5. 启用日志记录，对登录事件进行监控。
                      subjects:
                        - id: 00000000-0000-0000-0000-000000000001
                          name: 护网实战专题
                        - id: 00000000-0000-0000-0000-000000000002
