                      cvss3: "0.0"
                      cwe: ""
                      description: FTP 弱口令漏洞是指使用 FTP 的用户系统口令的长度太短、复杂度不够、仅包含数字、或仅包含字母等，容易被黑客攻击而造成非授权访问、下载资源等入侵行为。利用 FTP 弱口令漏洞可直接登录 FTP 服务，获取服务器资源，上传恶意文件，从而获取系统权限，并可能造成数据泄露，危害较大。
                      disclosure_date: "1970-01-01"
                      id: 00000000-5ab8-7046-e098-8e497f2a8f57
                      impact: 攻击者利用此漏洞可直接进入应用系统或者管理系统，从而进行系统、网页、数据的篡改与删除，非法获取系统、用户的数据，甚至可能导致服务器沦陷。
                      products: []
                      reference: []
                      severity: 2
                      solution: |-
                        不同的 FTP 服务软件有不同的修复方案，这里以 Windows 系统自带的 FTP  服务和 Linux 系统中的 FTP 服务为例，给出 FTP 弱口令漏洞修复方案。 
                        首先介绍 Windows 系统下的修复方案：

                        1. 启用强密码安全策略，对密码长度和包含的字符类型作出限制；
                        2. 启用账户登录失败处理机制，对登录失败的账户实施强处理，可有效防止暴力破解攻击事件；
                        3. 启用 FTP 目录隔离机制，目录隔离功能可以防止用户查看其它用户目录的文件，防止数据泄露；
                        4. 指定访问源 IP ，限制可访问 FTP 服务器的 IP；
                        5. 启用授权机制，根据业务需求配置授权规则，限制用户访问的权限；
                        6. 启用日志功能，IIS 中的 FTP 日志是默认启用的，您可以根据磁盘空间情况配置日志空间大小和其他策略。

                        Linux 系统下的修复方案：

                        1. 设置强安全密码，密码长度和包含的字符类型要满足一定的复杂度；
                        2. 及时安装更新补丁，减少软件系统漏洞；
                        3. 禁止显示 banner 信息；
                        4. 限制 FTP 登录用户，在 ftpusers 和 user_list 文件中列举的用户都是不允许访问 FTP 服务的用户（例如 root、bin、daemon 等用户）。除了需要登录 FTP 的用户外，其余用户都应该添加至此拒绝列表中。
                        5. 限制 FTP 用户目录，将用户行为限制在目录范围内；
                        6. 修改监听地址和默认端口；修改服务默认端口可以令批量扫描利用的攻击者成功攻击的概率降低，但仅能起到一定的防范作用，不能消除弱口令造成的影响，必须妥善修改口令。
                        7. 启用日志记录。
