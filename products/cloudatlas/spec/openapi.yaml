                      description: MSSQL 弱口令指的是在 MSSQL 数据库系统中对应的帐号使用的口令为弱口令的情况。该种情况下数据库账户的口令很容易被爆破工具暴力破解而对数据库进行未授权访问，一旦被恶意利用来登录系统，会导致数据泄露、篡改。如果得到了 root 权限登录 MSSQL 服务器，则可以写入恶意文件，危害更大。
                      disclosure_date: "1970-01-01"
                      id: 00000000-5ab9-e522-e098-8e7510241a2e
                      impact: 攻击者利用此漏洞可直接进入应用系统或者管理系统，从而进行系统、网页、数据的篡改与删除，非法获取系统、用户的数据，甚至可能导致服务器沦陷。
                      products: []
                      reference: []
                      severity: 2
                      solution: |-
                        1. 修改口令，增加口令复杂度，如同时包含大小写字母、数字和特殊字符等。
                        2. 修改完口令后，同时修改应用程序连接数据库的相关账号和密码。
                        3. 应该对 MSSQL 账户设置允许访问的 IP 白名单。
                        4. 不要使用默认的操作系统账号连接数据库，可以新建一个单独的数据库账号，并授权其连接数据库。
                        5. 通过设置防火墙 IP 规则，禁止外部访问 MSSQL 服务器端口。
                        6. 不要使用高权限账户启动 MSSQL 服务。
