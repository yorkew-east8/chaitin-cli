                      cvss3: "0.0"
                      cwe: ""
                      description: SSH 弱口令指使用 SSH 的用户系统口令的长度太短、复杂度不够、仅包含数字、或仅包含字母等，容易被黑客攻击而造成非授权访问、操作资源等入侵行为。利用 SSH 弱口令漏洞可直接远程登录服务器，获取或删除服务器资源，上传恶意文件，更改主机配置和权限，危害很大。
                      disclosure_date: "1970-01-01"
                      id: 00000000-5ab4-b486-e098-8e497f2a8f4b
                      impact: 攻击者利用此漏洞可直接进入应用系统或者管理系统，从而进行系统、网页、数据的篡改与删除，非法获取系统、用户的数据，甚至可能导致服务器沦陷。
                      products: []
                      reference: []
                      severity: 1
                      solution: |-
                        1. 启用强密码安全策略，对密码长度和包含的字符类型作出限制；
                        2. 使用 SSH 密钥，禁用口令认证；
                        3. 采用登陆 IP 白名单；
                        4. 更改服务器 SSH 的默认端口；修改服务默认端口可以令批量扫描利用的攻击者成功攻击的概率降低，但仅能起到一定的防范作用，不能消除弱口令造成的影响，必须妥善修改口令。
                        5. 使用 snort、ossec 等开源的入侵检测设备保护服务器。
