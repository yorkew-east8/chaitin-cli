                      cnvd: ""
                      created_at: "2024-03-29 10:42:13"
                      cve: ""
                      cvss3: "0.0"
                      cwe: ""
                      description: "phpMyAdmin 是一个用 PHP 编写的、基于 Web 的 MySQL 数据库管理工具软件。 通过该管理工具可以对 MySQL 进行各种操作，如何创建数据库，数据表和生成 MySQL 数据库脚本文件等该工具可以通过 Web 方式控制和操作 MySQL 数据库，可以完全对数据库进行操作，例如建立、复制、删除数据、执行 SQL 脚本命令等。通过该工具使得 MySQL 数据库的管理变得相当简单。    \n弱口令（Weak password）没有严格和准确的定义，通常认为容易被别人猜测到或被破解工具破解的口令均为弱口令。弱口令指的是仅包含简单数字和字母的口令，例如 “123456”、“123abc” 等。因为这样的口令很容易被别人破解，从而使对应的账户面临风险。"
                      disclosure_date: "1970-01-01"
                      id: 00000000-5a8a-7f5f-e098-8e7b4b857019
                      impact: 攻击者利用此漏洞可直接进入应用系统或者管理系统，从而进行系统、网页、数据的篡改与删除，非法获取系统、用户的数据，甚至可能导致服务器沦陷。
                      products:
                        - id: e94f8d31-192c-4a7f-b5ad-5aef50c004e6
                          name: phpMyAdmin
                      reference: []
                      severity: 2
                      solution: |-
                        1. 通过防火墙策略限制访问源  IP ，避免不必要的人员访问数据库管理平台；   
                        2. 设置较复杂的密码，如同时包含数字、字母、特殊字符并保证一定的密码长度；   
                        3. 通过 phpMyAdmin  提供的访问控制功能，配置允许访问 phpMyAdmin 的 IP；   
                        4. 根据使用人员角色对数据库账号进行精细化授权，防止运维风险；   
                        5. 配置支持该漏洞检测的安全工具，通过漏洞扫描给出告警，帮助您及时了解安全漏洞，并指导您快速修复该问题。
                      subjects:
                        - id: 00000000-0000-0000-0000-000000000001
                          name: 护网实战专题
                        - id: 00000000-0000-0000-0000-000000000002
                          name: 弱口令专题
                      title: phpMyAdmin 弱口令漏洞
