                      description: SNMP（Simple Network Management Protocol）弱口令漏洞指的是在运行 SNMP  服务的设备上，由于管理员配置不当，使用了默认团体名或一个很简单的团体名，而被管理的主机是通过比较请求的团体名是否和自己保存的一致来决定是否提供相应的服务，即团体名相当于一个认证的口令。攻击者可以通过该团体名获取到设备的敏感信息，包括系统运行的进程、已安装的软件、系统存在的用户、运行的服务、端口情况等。通过这些信息，攻击者可以清晰的了解到设备整体情况。根据开放的端口和服务快速定位可入侵点；根据运行的进程名判断是否存在哪些防护软件，有什么绕过的方法；根据存在的用户名，可以大大提高爆破效率等等，对系统安全的危害较大。
                      disclosure_date: "1970-01-01"
                      id: 00000000-5ab9-a238-e098-8e7510241a27
                      impact: 攻击者利用此漏洞可直接进入应用系统或者管理系统，从而进行系统、网页、数据的篡改与删除，非法获取系统、用户的数据，甚至可能导致服务器沦陷。
                      products: []
                      reference: []
                      severity: 2
                      solution: |-
                        1. 修改账号密码，增强密码复杂度
                        2. 如果没有使用 SNMP 服务来管理网络，关闭 SNMP 服务；
                        3. 修改默认团体名；
                        4. 利用防火墙限制通过 SNMP 访问设备的 ip ；
                        5. 升级 SNMP 到更安全的最新版本。
