                        3. 将默认端口 23 改为其他端口；修改服务默认端口可以令批量扫描利用的攻击者成功攻击的概率降低，但仅能起到一定的防范作用，不能消除弱口令造成的影响，必须妥善修改口令。
                        4. 设置允许访问 Telnet 的 IP 白名单；
                        5. 通过设置防火墙规则，禁止外部访问 Telnet 服务器管理端口。
