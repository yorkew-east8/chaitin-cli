info:
  description: Merged from Apifox shared markdown documents
  title: Cloud Atlas OpenAPI
  version: 1.0.0
paths:
  /v1/asset/cert:
    get:
      deprecated: false
      description: ""
      parameters:
        - description: 空间ID
          example: ""
          in: query
          name: space
          required: true
          schema:
            type: string
        - description: 状态
          example: ""
          in: query
          name: status
          required: false
          schema:
            enum:
              - valid
              - await
              - ignored
            type: string
            x-apifox:
              enumDescriptions:
                await: 待确认
                ignored: 已排除
                valid: 已确认
        - description: 排序字段，字段前加-表示降序，默认排序为-id
          example: ""
          in: query
          name: sort
          required: false
          schema:
            type: string
        - description: 页码
          example: 1
          in: query
          name: page
          required: false
          schema:
            type: integer
        - description: 分页大小
          example: 20
          in: query
          name: size
          required: false
          schema:
            type: integer
        - description: 通用名称（CN）
          example: ""
          in: query
          name: cn_name
          required: false
          schema:
            type: string
        - description: 组织（O）
          example: ""
          in: query
          name: o_name
          required: false
          schema:
            type: string
        - description: 部门（OU）
          example: ""
          in: query
          name: ou_name
          required: false
          schema:
            enum:
              - ANDROID
              - IOS
            type: string
            x-apifox:
              enumDescriptions:
                ANDROID: ""
                IOS: ""
        - description: 邮箱
          example: ""
          in: query
          name: email_name
          required: false
          schema:
            type: string
        - description: 是否受信任
          example: ""
          in: query
          name: trusted
          required: false
          schema:
            type: boolean
        - description: 首次发现开始时间，格式为`2023-01-01 00:00:00`，配合created_at_before使用
          example: ""
          in: query
          name: created_at_after
          required: false
          schema:
            type: string
        - description: 首次发现结束时间，格式为`2023-01-01 00:00:00`，配合created_at_after使用
          example: ""
          in: query
          name: created_at_before
          required: false
          schema:
            type: string
        - description: 最后发现开始时间，格式为`2023-01-01 00:00:00`，配合lastseen_at_before使用
          example: ""
          in: query
          name: lastseen_at_after
          required: false
          schema:
            type: string
        - description: 最后发现结束时间，格式为`2023-01-01 00:00:00`，配合lastseen_at_after使用
          example: ""
          in: query
          name: lastseen_at_before
          required: false
          schema:
            type: string
