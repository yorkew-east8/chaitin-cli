                      description: MongoDB 弱口令漏洞指的就是 MongoDB 在使用过程中没有正确设置数据库的访问权限，导致数据库被非授权用户访问并对数据库数据进行增删改等高危操作。MongoDB 数据库弱口令漏洞危害严重，可以导致数据库数据泄露或被删除勒索，从而造成严重的生产事故。
                      disclosure_date: "1970-01-01"
                      id: 00000000-5abb-f68b-e098-8e2efb5c8a2c
                      impact: 攻击者利用此漏洞可直接进入应用系统或者管理系统，从而进行系统、网页、数据的篡改与删除，非法获取系统、用户的数据，甚至可能导致服务器沦陷。
                      products: []
                      reference: []
                      severity: 1
                      solution: |-
                        1. 修改默认的 MongoDB 端口（默认为:27017）为其他端口。修改服务默认端口可以令批量扫描利用的攻击者成功攻击的概率降低，但仅能起到一定的防范作用，不能消除弱口令造成的影响，必须妥善修改口令。
                        2. 关闭 MongoDB 的 HTTP 服务和 REST 接口。在 2.6 版本以后 RESET 接口默认是关闭的； MongoDB 默认会使用默认端口监听 Web 服务，一般不需要通过 Web 方式进行远程管理，建议禁用。
                        3. 如果需要通过 Web 方式进行远程管理，要通过防火墙对ip进行限制，或通过使用 --bind_ip 选项配置监听 ip 。
                        4. 开启日志审计功能，记录用户对数据库的所有相关操作。
                        5. 开启 MongoDB 授权，在 admin 数据库中创建用户，并在启动时加上认证参数。
